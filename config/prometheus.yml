# Prometheus Configuration for SentinelQA Staging
# Auto-discovers and scrapes metrics from all SentinelQA services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# ── Alert Rules (loaded from separate files in production) ────────────────────
rule_files: []

# ── Scrape Targets ────────────────────────────────────────────────────────────
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          environment: 'staging'

  # Node Exporter — host-level CPU, memory, disk metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          environment: 'staging'

  # SentinelQA Next.js App
  # NOTE: Next.js doesn't expose /metrics by default. If you add
  # a custom metrics endpoint (e.g., using prom-client), uncomment:
  # - job_name: 'sentinelqa-app'
  #   metrics_path: '/api/metrics'
  #   static_configs:
  #     - targets: ['sentinelqa-app:3000']
  #       labels:
  #         service: 'sentinelqa-app'
  #         environment: 'staging'

  # AI Engine — Python FastAPI (if using prometheus_client)
  # - job_name: 'ai-engine'
  #   metrics_path: '/metrics'
  #   static_configs:
  #     - targets: ['ai-engine:5000']
  #       labels:
  #         service: 'ai-engine'
  #         environment: 'staging'

  # MongoDB Exporter (if added)
  # - job_name: 'mongodb'
  #   static_configs:
  #     - targets: ['mongodb-exporter:9216']
  #       labels:
  #         service: 'mongodb'
  #         environment: 'staging'
